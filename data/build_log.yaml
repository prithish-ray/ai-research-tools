- date: "2025-05-01"
  tool_name: "Stock Thesis Commit + Delta Monitor"
  slug: "thesis-monitor"
  problem_solved: >
    Built a thesis formalisation and assumption-monitoring tool to address analyst
    anchoring bias and thesis drift. Enables explicit commit-and-monitor discipline.
  stack:
    - "Python"
    - "Flask"
    - "Groq API"
    - "Tavily Search API"
    - "JSON"
    - "Render"
  status: "Live"
  notes: >
    Most technically complex tool to date due to two-mode architecture (commit vs monitor)
    and assumption-specific prompt design. Session-scoped storage is a known limitation;
    persistent database is the primary next step.

- date: "2025-05-04"
  tool_name: "Macro Signal to Stock Idea Generator"
  slug: "macro-to-company"
  problem_solved: >
    Automated the top-down macro-to-equity translation workflow using a multi-step
    prompt chain. Outputs a structured screening memo with transmission mechanism
    reasoning and theme risks.
  stack:
    - "Python"
    - "Flask"
    - "Groq API"
    - "Tavily Search API"
    - "Prompt chaining"
    - "Render"
  status: "Live"
  notes: >
    First tool using an explicit multi-step prompt chain (macro decomposition → sector
    mapping → equity candidate generation → risk identification). Chain design proved
    significantly better than single-prompt equivalents for structured reasoning quality.

- date: "2026-05-12"
  tool_name: "Invert AI"
  slug: "invert-ai"
  problem_solved: >
    Applied Charlie Munger's inversion mental model to investment decision-making.
    Forces a structured pre-mortem before acting — surfaces failure modes, challenges
    implicit assumptions, and counteracts confirmation bias at the point of highest conviction.
  stack:
    - "Python"
    - "Flask"
    - "Groq API"
    - "Render"
  status: "Live"
  notes: >
    First tool focused on decision quality rather than information retrieval. No external
    search API required — inversion is pure reasoning over the user's stated thesis.
    Deliberately stripped-back stack; the value is entirely in the prompt design and
    the mental model it enforces.
