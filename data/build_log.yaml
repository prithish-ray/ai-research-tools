- date: "2025-04-30"
  tool_name: "Company Research Tool"
  slug: "company-research-tool"
  problem_solved: >
    Replaced unstructured LLM company queries with a source-linked, section-structured
    research note generator. Reduces time-to-context on new names from 20+ minutes to
    under 2 minutes while enforcing citation discipline.
  stack:
    - "Python"
    - "Flask"
    - "Groq API"
    - "Tavily Search API"
    - "Render"
  status: "Live"
  notes: >
    First production deployment. Established the core Flask + Groq + Tavily pattern
    used in subsequent tools. Key design decision: always surface sources alongside
    output to prevent uncritical LLM acceptance.

